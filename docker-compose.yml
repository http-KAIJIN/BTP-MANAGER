services:
  postgres:
    image: postgres:17-alpine
    container_name: btp-manager-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-btp_manager}
      POSTGRES_USER: ${POSTGRES_USER:-btp_manager}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-btp_manager_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-btp_manager} -d ${POSTGRES_DB:-btp_manager}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: btp-manager-backend
    restart: unless-stopped
    environment:
      PORT: ${BACKEND_PORT:-3001}
      DATABASE_URL: ${DATABASE_URL:-postgresql://btp_manager:btp_manager_password@postgres:5432/btp_manager}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-access-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh-secret}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-7d}
      DEFAULT_ADMIN_EMAIL: ${DEFAULT_ADMIN_EMAIL:-admin@btp-manager.local}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-Admin@123456}
      DEFAULT_ADMIN_NAME: ${DEFAULT_ADMIN_NAME:-BTP Manager Administrator}
      UPLOAD_STORAGE_PATH: ${UPLOAD_STORAGE_PATH:-/app/uploads}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    ports:
      - "${BACKEND_PORT:-3001}:${BACKEND_PORT:-3001}"
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: btp-manager-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api/v1}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend

volumes:
  postgres-data:
  uploads:
